project_doc_fallback_filenames = ["AGENT.md"]
project_doc_max_bytes = 65536
profile = "research"

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 5400

[profiles.research]
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
service_tier = "flex"

[profiles.research-batch]
model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"
service_tier = "flex"

[profiles.map]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.audit]
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "read-only"
web_search = "live"
